<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Auth Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    <style>
        /* ── CSS Variables ─────────────────────────────────────── */
        :root {
            --bg:           #f0ede8;
            --bg2:          #e8e4de;
            --surface:      #ffffff;
            --surface2:     #f7f5f2;
            --border:       #e0dbd3;
            --border-focus: #1a3a5c;
            --accent:       #1a3a5c;
            --accent-mid:   #2a5480;
            --accent-light: #1a3a5c14;
            --accent-soft:  #1a3a5c08;
            --success:      #1a6644;
            --success-bg:   #e8f5ee;
            --success-bdr:  #b8dfc9;
            --error:        #8b1a2a;
            --error-bg:     #fdf0f2;
            --error-bdr:    #e8b8c0;
            --text:         #1c1814;
            --text-mid:     #4a4540;
            --text-muted:   #8a847c;
            --text-dim:     #c0bbb5;
            --shadow-sm:    0 1px 3px #00000010, 0 1px 2px #00000008;
            --shadow-md:    0 4px 16px #00000010, 0 2px 6px #00000008;
            --shadow-lg:    0 12px 48px #1a3a5c14, 0 4px 16px #00000010;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body:    'Epilogue', sans-serif;
            --radius:       12px;
            --radius-sm:    8px;
            --transition:   0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Reset & Base ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Linen-like background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    radial-gradient(ellipse 80% 60% at 15% 10%, #ffffff80 0%, transparent 55%),
                    radial-gradient(ellipse 60% 70% at 85% 90%, #d4cfc880 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── Layout: two-panel feel ────────────────────────────── */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 880px;
            display: grid;
            grid-template-columns: 1fr 420px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            animation: wrapIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes wrapIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Left Panel (branding) ─────────────────────────────── */
        .panel-left {
            background: var(--accent);
            padding: 56px 44px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* Geometric decoration */
        .panel-left::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 220px; height: 220px;
            border: 40px solid #ffffff0c;
            border-radius: 50%;
        }

        .panel-left::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -40px;
            width: 160px; height: 160px;
            border: 30px solid #ffffff08;
            border-radius: 50%;
        }

        .panel-brand {
            position: relative;
            z-index: 1;
        }

        .brand-mark {
            width: 42px; height: 42px;
            background: #ffffff18;
            border: 1px solid #ffffff28;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }

        .brand-mark svg {
            width: 20px; height: 20px;
            fill: #fff;
        }

        .brand-headline {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            line-height: 1.25;
            letter-spacing: -0.3px;
            margin-bottom: 16px;
        }

        .brand-byline {
            font-size: 12px;
            color: #ffffff55;
            font-weight: 400;
            letter-spacing: 0.3px;
            margin-top: 10px;
        }

        .brand-byline span {
            color: #ffffffaa;
            font-weight: 600;
        }

        /* ── Right Panel (form) ────────────────────────────────── */
        .panel-right {
            padding: 44px 40px;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ────────────────────────────────────────────── */
        .form-header {
            margin-bottom: 28px;
        }

        .form-header h2 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .form-header p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ── Tabs ──────────────────────────────────────────────── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
            gap: 0;
        }

        .tab-btn {
            padding: 10px 20px 10px 0;
            border: none;
            background: transparent;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: color var(--transition);
            letter-spacing: 0.1px;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform var(--transition);
        }

        .tab-btn.active {
            color: var(--accent);
        }

        .tab-btn.active::after {
            transform: scaleX(1);
        }

        .tab-btn:not(.active):hover { color: var(--text-mid); }

        /* ── Form Groups ───────────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px; height: 15px;
            stroke: var(--text-dim);
            transition: stroke var(--transition);
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 11px 14px 11px 37px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
        }

        input::placeholder { color: var(--text-dim); }

        input:focus {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-wrap:focus-within .input-icon {
            stroke: var(--accent);
        }

        /* ── Submit Button ─────────────────────────────────────── */
        .submit-btn {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2px;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px #1a3a5c30;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-mid);
            box-shadow: 0 4px 16px #1a3a5c40;
            transform: translateY(-1px);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 6px #1a3a5c28;
        }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* ── Spinner ───────────────────────────────────────────── */
        .spinner {
            width: 15px; height: 15px;
            border: 2px solid #ffffff44;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Messages ──────────────────────────────────────────── */
        .message {
            margin-top: 16px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            font-size: 12.5px;
            font-weight: 400;
            line-height: 1.5;
            display: none;
            align-items: flex-start;
            gap: 9px;
            animation: msgIn 0.25s ease both;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.show { display: flex; }

        .message.success {
            background: var(--success-bg);
            border: 1px solid var(--success-bdr);
            color: var(--success);
        }

        .message.error {
            background: var(--error-bg);
            border: 1px solid var(--error-bdr);
            color: var(--error);
        }

        .message-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

        /* ── Token Box ─────────────────────────────────────────── */
        .token-box {
            margin-top: 18px;
            padding: 16px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-light);
            border-radius: var(--radius-sm);
            display: none;
            animation: msgIn 0.3s ease both;
        }

        .token-box.show { display: block; }

        .token-label {
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .token-status {
            width: 7px; height: 7px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #1a664466; }
            50%       { opacity: 0.7; box-shadow: 0 0 0 4px #1a664400; }
        }

        .token-value {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--text-mid);
            word-break: break-all;
            line-height: 1.7;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border-focus);
            border-radius: 6px;
            font-family: var(--font-body);
            font-size: 11.5px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.2px;
        }

        .copy-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ── Footer ────────────────────────────────────────────── */
        .form-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
        }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 720px) {
            .wrapper {
                grid-template-columns: 1fr;
                max-width: 420px;
            }

            .panel-left {
                padding: 32px 28px;
                gap: 24px;
            }

            .brand-headline { font-size: 22px; }
            .panel-features { flex-direction: row; flex-wrap: wrap; }
            .feature-item   { font-size: 11.5px; }
        }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .panel-right { padding: 32px 24px; }
            .panel-left  { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- ── Left Branding Panel ──────────────────────────── -->
    <div class="panel-left">
        <div class="panel-brand">
            <div class="brand-mark">
                <!-- Shield icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4 6v6c0 5.25 3.5 10.14 8 11.25C16.5 22.14 20 17.25 20 12V6l-8-4z"/>
                </svg>
            </div>
            <div class="brand-headline">Secure<br/>Authentication</div>
            <div class="brand-byline">by <span>Dev Ash</span></div>
        </div>
    </div>

    <!-- ── Right Form Panel ─────────────────────────────── -->
    <div class="panel-right">

        <div class="form-header">
            <h2 id="form-title">Welcome back</h2>
            <p id="form-subtitle">Sign in to your account to continue.</p>
        </div>

        <!-- Tabs -->
        <div class="tabs" role="tablist">
            <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')"    role="tab">Sign In</button>
            <button class="tab-btn"        id="tab-register" onclick="switchTab('register')" role="tab">Create Account</button>
        </div>

        <!-- Username -->
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
                <input
                        type="text"
                        id="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        spellcheck="false"
                />
                <!-- Person icon -->
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
            </div>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                />
                <!-- Lock icon -->
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="11" width="14" height="10" rx="2"/>
                    <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
                </svg>
            </div>
        </div>

        <!-- Submit -->
        <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
            <span id="btn-text">Sign In</span>
        </button>

        <!-- Status message -->
        <div class="message" id="message" role="alert">
            <span class="message-icon" id="message-icon"></span>
            <span id="message-text"></span>
        </div>

        <!-- JWT Token display -->
        <div class="token-box" id="token-box">
            <div class="token-label">
                <div class="token-status"></div>
                JWT Token Issued
            </div>
            <div class="token-value" id="token-value"></div>
            <button class="copy-btn" onclick="copyToken()">Copy Token</button>
        </div>

        <!-- Footer -->
        <div class="form-footer">
            <div class="status-dot"></div>
            Connected to /backend
        </div>

    </div>
</div>

<!-- ── JavaScript ─────────────────────────────────── -->
<script>
    // ── Config ─────────────────────────────────────────────
    const BASE_URL  = 'http://127.0.0.1:8080/auth';
    let   activeTab = 'login';

    // ── Tab Switching ──────────────────────────────────────
    function switchTab(tab) {
        activeTab = tab;

        document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');

        // Update heading and button copy
        if (tab === 'login') {
            document.getElementById('form-title').textContent    = 'Welcome back';
            document.getElementById('form-subtitle').textContent = 'Sign in to your account to continue.';
            document.getElementById('btn-text').textContent      = 'Sign In';
        } else {
            document.getElementById('form-title').textContent    = 'Create account';
            document.getElementById('form-subtitle').textContent = 'Register a new account to get started.';
            document.getElementById('btn-text').textContent      = 'Create Account';
        }

        // Clear state
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        hideMessage();
        hideToken();
    }

    // ── Handle Submit ──────────────────────────────────────
    async function handleSubmit() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        // Basic validation
        if (!username || !password) {
            showMessage('error', 'Please complete all fields before continuing.');
            return;
        }

        const endpoint = activeTab === 'login' ? '/login' : '/register';

        setLoading(true);
        hideMessage();
        hideToken();

        try {
            // ── POST request ──────────────────────────────────
            const response = await fetch(`${BASE_URL}${endpoint}`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (response.ok) {
                // ── Success ───────────────────────────────────
                if (activeTab === 'login' && data.token) {
                    // Store token in localStorage
                    localStorage.setItem('jwt_token', data.token);
                    showMessage('success', data.message || 'Authentication successful.');
                    showToken(data.token);
                } else {
                    showMessage('success', data.message || 'Account created successfully.');
                }
            } else {
                // ── Server error ──────────────────────────────
                showMessage('error', data.message || 'The request could not be completed.');
            }

        } catch (err) {
            // ── Network error ─────────────────────────────────
            if (err instanceof TypeError) {
                showMessage('error', 'Unable to reach the server. Verify Spring Boot is running on port 8080.');
            } else {
                showMessage('error', 'An unexpected error occurred. See console for details.');
                console.error('Auth error:', err);
            }
        } finally {
            setLoading(false);
        }
    }

    // ── Loading State ──────────────────────────────────────
    function setLoading(isLoading) {
        const btn     = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');

        btn.disabled = isLoading;

        if (isLoading) {
            btnText.style.display = 'none';
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            spinner.id = 'spinner';
            btn.appendChild(spinner);
        } else {
            const spinner = document.getElementById('spinner');
            if (spinner) spinner.remove();
            btnText.style.display = 'inline';
            btnText.textContent = activeTab === 'login' ? 'Sign In' : 'Create Account';
        }
    }

    // ── Message Helpers ────────────────────────────────────
    function showMessage(type, text) {
        const el = document.getElementById('message');
        document.getElementById('message-icon').textContent = type === 'success' ? '✓' : '✕';
        document.getElementById('message-text').textContent = text;
        el.className = `message show ${type}`;
    }

    function hideMessage() {
        document.getElementById('message').className = 'message';
    }

    // ── Token Helpers ──────────────────────────────────────
    function showToken(token) {
        document.getElementById('token-value').textContent = token;
        document.getElementById('token-box').classList.add('show');
    }

    function hideToken() {
        document.getElementById('token-box').classList.remove('show');
    }

    function copyToken() {
        const token = document.getElementById('token-value').textContent;
        navigator.clipboard.writeText(token).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy Token'; }, 2000);
        });
    }

    // ── Enter key submits ──────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSubmit();
    });

    // ── Restore saved token on page load ──────────────────
    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('jwt_token');
        if (saved) showToken(saved);
    });
</script>

</body>
</html>
